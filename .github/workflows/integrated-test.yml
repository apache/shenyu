name: it

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - master

env:
  MVND_VERSION: 1.0.2
  IT_IMAGES_ARTIFACT: shenyu-it-images
  IT_LOCAL_M2_ARTIFACT: shenyu-it-local-m2

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./actions/paths-filter
        id: filter
        with:
          filters: |
            integration:
              - 'shenyu-integrated-test/**'
              - 'shenyu-*/**'
              - 'pom.xml'
              - '**/pom.xml'
              - 'shenyu-examples/**'
              - '!**/*.md'
              - '!**/*.txt'
              - '!resources/static/**'
              - '!.asf.yaml'
              - '!.gitignore'
              - '!.licenserc.yaml'
              - '!LICENSE'
              - '!NOTICE'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE'

  prepare-images:
    needs: changes
    runs-on: ubuntu-latest
    if: github.repository == 'apache/shenyu' && needs.changes.outputs.integration == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Copied from https://github.com/jens-maus/RaspberryMatic/blob/ea6b8ce0dd2d53ea88b2766ba8d7f8e1d667281f/.github/workflows/ci.yml#L34-L40
      # and https://github.com/actions/virtual-environments/issues/709#issuecomment-612569242
      - name: Free disk space
        run: |
          df --human-readable
          sudo apt clean
          for image in $(docker image ls --all --quiet); do
            docker rmi "$image"
          done
          rm --recursive --force "$AGENT_TOOLSDIRECTORY"
          df --human-readable

      - name: Restore ShenYu Maven Repos
        id: restore-maven-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"

      - name: Install mvnd
        shell: bash
        run: |
          curl -sL "https://downloads.apache.org/maven/mvnd/${MVND_VERSION}/maven-mvnd-${MVND_VERSION}-linux-amd64.zip" -o mvnd.zip
          unzip -q mvnd.zip
          mkdir -p "$HOME/.local"
          mv "maven-mvnd-${MVND_VERSION}-linux-amd64" "$HOME/.local/mvnd"
          echo "$HOME/.local/mvnd/bin" >> "$GITHUB_PATH"
          echo "MVND_HOME=$HOME/.local/mvnd" >> "$GITHUB_ENV"

      - name: Build with Maven
        shell: bash
        run: |
          if mvnd --version > /dev/null 2>&1; then
            echo "Using mvnd for build"
            mvnd -B clean install -Prelease,docker -Dmaven.javadoc.skip=true -Dmaven.test.skip=true
          else
            echo "Falling back to maven wrapper"
            ./mvnw -B clean install -Prelease,docker -Dmaven.javadoc.skip=true -Dmaven.test.skip=true
          fi

      - name: Build examples
        shell: bash
        run: |
          if mvnd --version > /dev/null 2>&1; then
            echo "Using mvnd for build examples"
            mvnd -B install -Pexample -Dmaven.javadoc.skip=true -Dmaven.test.skip=true -am -f ./shenyu-examples/pom.xml
          else
            echo "Falling back to maven wrapper for examples"
            ./mvnw -B install -Pexample -Dmaven.javadoc.skip=true -Dmaven.test.skip=true -am -f ./shenyu-examples/pom.xml
          fi

      - name: Build integrated tests
        shell: bash
        run: |
          if mvnd --version > /dev/null 2>&1; then
            echo "Using mvnd for build integrated tests"
            mvnd -B install -Pit -DskipTests -f ./shenyu-integrated-test/pom.xml
          else
            echo "Falling back to maven wrapper for integrated tests"
            ./mvnw -B install -Pit -DskipTests -f ./shenyu-integrated-test/pom.xml
          fi

      - name: Export prebuilt images
        run: |
          bash .github/scripts/package-integrated-test-local-images.sh \
            --output /tmp/shenyu-it-images.tar

      - name: Package local Maven artifacts
        run: |
          bash .github/scripts/package-shenyu-maven-snapshots.sh \
            --output /tmp/shenyu-it-local-m2.tar.gz

      - name: Upload prebuilt images
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IT_IMAGES_ARTIFACT }}
          path: /tmp/shenyu-it-images.tar
          retention-days: 1
          compression-level: 0

      - name: Upload local Maven artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IT_LOCAL_M2_ARTIFACT }}
          path: /tmp/shenyu-it-local-m2.tar.gz
          retention-days: 1
          compression-level: 0

      - name: Save ShenYu Maven Repos
        if: steps.restore-maven-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

  build:
    needs:
      - changes
      - prepare-images
    strategy:
      matrix:
        case:
          - shenyu-integrated-test-apache-dubbo
          - shenyu-integrated-test-grpc
          - shenyu-integrated-test-http
          - shenyu-integrated-test-https
          - shenyu-integrated-test-motan
          - shenyu-integrated-test-spring-cloud
          - shenyu-integrated-test-sofa
          - shenyu-integrated-test-websocket
          - shenyu-integrated-test-rewrite
          - shenyu-integrated-test-combination
          - shenyu-integrated-test-sdk-apache-dubbo
          - shenyu-integrated-test-sdk-http
    runs-on: ubuntu-latest
    if: github.repository == 'apache/shenyu' && needs.changes.outputs.integration == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Copied from https://github.com/jens-maus/RaspberryMatic/blob/ea6b8ce0dd2d53ea88b2766ba8d7f8e1d667281f/.github/workflows/ci.yml#L34-L40
      # and https://github.com/actions/virtual-environments/issues/709#issuecomment-612569242
      - name: Free disk space
        run: |
          df --human-readable
          sudo apt clean
          for image in $(docker image ls --all --quiet); do
            docker rmi "$image"
          done
          rm --recursive --force "$AGENT_TOOLSDIRECTORY"
          df --human-readable

      - name: Restore ShenYu Maven Repos
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"

      - name: Install mvnd
        shell: bash
        run: |
          curl -sL "https://downloads.apache.org/maven/mvnd/${MVND_VERSION}/maven-mvnd-${MVND_VERSION}-linux-amd64.zip" -o mvnd.zip
          unzip -q mvnd.zip
          mkdir -p "$HOME/.local"
          mv "maven-mvnd-${MVND_VERSION}-linux-amd64" "$HOME/.local/mvnd"
          echo "$HOME/.local/mvnd/bin" >> "$GITHUB_PATH"
          echo "MVND_HOME=$HOME/.local/mvnd" >> "$GITHUB_ENV"

      - name: Download prebuilt images
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IT_IMAGES_ARTIFACT }}
          path: /tmp

      - name: Download local Maven artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IT_LOCAL_M2_ARTIFACT }}
          path: /tmp

      - name: Restore local Maven artifacts
        run: |
          mkdir -p "$HOME/.m2/repository"
          tar -C "$HOME/.m2/repository" -xzf /tmp/shenyu-it-local-m2.tar.gz

      - name: Load prebuilt images
        run: docker load --input /tmp/shenyu-it-images.tar

      - name: Start docker compose
        run: docker compose -f ./shenyu-integrated-test/${{ matrix.case }}/docker-compose.yml up -d

      - name: Wait for docker compose start up completely
        run: bash ./shenyu-integrated-test/${{ matrix.case }}/script/healthcheck.sh

      - name: Disk space info
        run: |
          df --human-readable

      - name: Run test
        id: test
        shell: bash
        run: |
          if mvnd --version > /dev/null 2>&1; then
            echo "Using mvnd for running tests"
            mvnd test -Pit -f ./shenyu-integrated-test/${{ matrix.case }}/pom.xml
          else
            echo "Falling back to maven wrapper for tests"
            ./mvnw test -Pit -f ./shenyu-integrated-test/${{ matrix.case }}/pom.xml
          fi
        continue-on-error: true

      - name: Check test result
        run: |
          docker compose -f ./shenyu-integrated-test/${{ matrix.case }}/docker-compose.yml logs --tail="all"
          if [[ ${{ steps.test.outcome }} == "failure" ]]; then
            echo "Test Failed"
            exit 1
          else
            echo "Test Successful"
            exit 0
          fi
