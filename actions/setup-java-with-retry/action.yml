name: 'Setup Java With Retry'
description: 'Retries actions/setup-java to reduce transient GitHub release download failures.'
inputs:
  java-version:
    description: 'Java version to install.'
    required: true
  distribution:
    description: 'Java distribution to install.'
    required: false
    default: 'temurin'
  cache:
    description: 'Package manager cache to use.'
    required: false
    default: ''
  cache-dependency-path:
    description: 'Dependency file path for cache key generation.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup Java attempt 1
      id: setup-java-1
      uses: actions/setup-java@v4
      continue-on-error: true
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
    - name: Setup Java attempt 2
      id: setup-java-2
      if: steps.setup-java-1.outcome == 'failure'
      uses: actions/setup-java@v4
      continue-on-error: true
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
    - name: Setup Java attempt 3
      if: steps.setup-java-1.outcome == 'failure' && steps.setup-java-2.outcome == 'failure'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
